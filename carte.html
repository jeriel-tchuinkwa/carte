<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mipmip - Qualité Route</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100vw; height: 100vh; }
        #info {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
        }
        #legende {
            position: fixed;
            bottom: 20px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 1000;
        }
        .dot { display: inline-block; width: 12px; height: 12px;
               border-radius: 50%; margin-right: 5px; }
    </style>
</head>
<body>
    <div id="info">📍 Chargement...</div>
    <div id="legende">
        <b>Qualité de route</b><br>
        <span class="dot" style="background:#00cc00"></span>Bonne<br>
        <span class="dot" style="background:#ffaa00"></span>Moyenne<br>
        <span class="dot" style="background:#ff4400"></span>Mauvaise<br>
        <span class="dot" style="background:#cc0000"></span>Très mauvaise
    </div>
    <div id="map"></div>

    <script>
        var map = L.map('map').setView([46.3460, -72.5754], 14);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors',
    maxZoom: 19
}).addTo(map);

var firebaseURL = "https://speedy-e0d6b-default-rtdb.firebaseio.com/points.json";

function getCouleur(mag) {
    if (mag < 0.8) return '#00cc00';
    if (mag < 1.5) return '#ffaa00';
    if (mag < 2.5) return '#ff4400';
    return '#cc0000';
}

// Marqueur position actuelle (bleu)
var positionMarker = L.circleMarker([46.3460, -72.5754], {
    radius: 10,
    color: '#0066ff',
    fillColor: '#0066ff',
    fillOpacity: 1
}).addTo(map).bindPopup("Position actuelle");

var dernierePosition = null;

function chargerPoints() {
    fetch(firebaseURL)
        .then(r => r.json())
        .then(data => {
            if (!data) return;
            
            var points = Object.values(data);
            var count = points.length;
            
            // Afficher tous les points de qualité
            points.forEach(function(d) {
                L.circleMarker([d.lat, d.lon], {
                    radius: 8,
                    color: getCouleur(d.mag),
                    fillColor: getCouleur(d.mag),
                    fillOpacity: 0.8
                }).addTo(map).bindPopup("Force: " + d.mag.toFixed(2) + "g");
            });
            
            // Déplacer le marqueur bleu sur le dernier point
            var dernierPoint = points[count - 1];
            if (dernierPoint) {
                var newPos = [dernierPoint.lat, dernierPoint.lon];
                positionMarker.setLatLng(newPos);
                
                // Centrer la carte si position a changé
                if (!dernierePosition || 
                    dernierePosition[0] !== newPos[0] || 
                    dernierePosition[1] !== newPos[1]) {
                    map.setView(newPos, 16);
                    dernierePosition = newPos;
                }
            }
            
            document.getElementById('info').innerHTML = 
                '📍 ' + count + ' points enregistrés';
        });
}

chargerPoints();
setInterval(chargerPoints, 3000);
    </script>
</body>
</html>
