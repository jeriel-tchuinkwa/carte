<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speedy - Qualité Route</title>
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.css" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100vw; height: 100vh; }
        #info {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
        }
        #legende {
            position: fixed;
            bottom: 20px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 1000;
        }
        .dot { display: inline-block; width: 12px; height: 12px;
               border-radius: 50%; margin-right: 5px; }
    </style>
</head>
<body>
    <div id="info">📍 Chargement...</div>
    <div id="legende">
        <b>Qualité de route</b><br>
        <span class="dot" style="background:#00cc00"></span>Bonne<br>
        <span class="dot" style="background:#ffaa00"></span>Moyenne<br>
        <span class="dot" style="background:#ff4400"></span>Mauvaise<br>
        <span class="dot" style="background:#cc0000"></span>Très mauvaise
    </div>
    <div id="map"></div>

    <script>
        mapboxgl.accessToken = 'pk.eyJ1IjoiamVib3giLCJhIjoiY21tbmhrd3AxMDM1bTJzcHY0NmI2d2hiZiJ9.IXBfzH6eF2wVu9rTdk5XxA';

        var map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/streets-v12',
            center: [-72.5754, 46.3460],
            zoom: 14
        });

        // Contrôles de navigation
        map.addControl(new mapboxgl.NavigationControl());

        // GPS position actuelle
        map.addControl(new mapboxgl.GeolocateControl({
            positionOptions: { enableHighAccuracy: true },
            trackUserLocation: true,
            showUserHeading: true
        }));

        var firebaseURL = "https://speedy-e0d6b-default-rtdb.firebaseio.com/points.json";

        function getCouleur(mag) {
            if (mag < 0.8) return '#00cc00';
            if (mag < 1.5) return '#ffaa00';
            if (mag < 2.5) return '#ff4400';
            return '#cc0000';
        }

        var markeurs = [];

        function chargerPoints() {
            fetch(firebaseURL)
                .then(r => r.json())
                .then(data => {
                    if (!data) return;
                    var points = Object.values(data);

                    // Supprimer anciens marqueurs
                    markeurs.forEach(m => m.remove());
                    markeurs = [];

                    points.forEach(function(d) {
                        if (!d.lat || !d.lon) return;
                        var el = document.createElement('div');
                        el.style.width = '16px';
                        el.style.height = '16px';
                        el.style.borderRadius = '50%';
                        el.style.backgroundColor = getCouleur(d.mag);
                        el.style.border = '2px solid white';

                        var marker = new mapboxgl.Marker(el)
                            .setLngLat([d.lon, d.lat])
                            .setPopup(new mapboxgl.Popup().setText('Force: ' + d.mag.toFixed(2) + 'g'))
                            .addTo(map);

                        markeurs.push(marker);
                    });

                    document.getElementById('info').innerHTML =
                        '📍 ' + points.length + ' points enregistrés';
                });
        }

        map.on('load', function() {
            chargerPoints();
            setInterval(chargerPoints, 3000);
        });
    </script>
</body>
</html>
