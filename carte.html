<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speedy - Qualité Route</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100vw; height: 100vh; }
        #info {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
        }
        #legende {
            position: fixed;
            bottom: 20px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 1000;
        }
        .dot { display: inline-block; width: 12px; height: 12px;
               border-radius: 50%; margin-right: 5px; }
    </style>
</head>
<body>
    <div id="info">📍 Chargement...</div>
    <div id="legende">
        <b>Qualité de route</b><br>
        <span class="dot" style="background:#00cc00"></span>Bonne<br>
        <span class="dot" style="background:#ffaa00"></span>Moyenne<br>
        <span class="dot" style="background:#ff4400"></span>Mauvaise<br>
        <span class="dot" style="background:#cc0000"></span>Très mauvaise
    </div>
    <div id="map"></div>
    <script>
        var map = L.map('map').setView([46.3460, -72.5754], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap',
            maxZoom: 19
        }).addTo(map);

        var firebaseURL = "https://speedy-e0d6b-default-rtdb.firebaseio.com";
        var positionActuelle = null;
        var derniereAccelero = {mag: 1.0, vibration: 0.0};

        function getCouleur(vibration) {
            if (vibration < 0.2) return '#00cc00';
            if (vibration < 0.5) return '#ffaa00';
            if (vibration < 1.0) return '#ff4400';
            return '#cc0000';
        }

        var markeurs = [];

        // Lire les dernières données accéléromètre depuis Firebase
        function lireAccelero() {
            fetch(firebaseURL + '/accelero.json')
                .then(r => r.json())
                .then(data => {
                    if (!data) return;
                    // Prendre le dernier enregistrement
                    var keys = Object.keys(data);
                    var dernierKey = keys[keys.length - 1];
                    var dernierData = data[dernierKey];
                    if (dernierData) {
                        derniereAccelero.mag = parseFloat(dernierData.mag) || 1.0;
                        derniereAccelero.vibration = parseFloat(dernierData.vibration) || 0.0;
                    }
                }).catch(e => {});
        }

        // Envoyer point combiné GPS + accéléromètre
        function envoyerPoint(lat, lon) {
            var data = JSON.stringify({
                lat: lat,
                lon: lon,
                mag: derniereAccelero.mag,
                vibration: derniereAccelero.vibration
            });
            fetch(firebaseURL + '/points.json', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: data
            }).catch(e => {});
        }

        // Charger et afficher tous les points
        function chargerPoints() {
            fetch(firebaseURL + '/points.json')
                .then(r => r.json())
                .then(data => {
                    if (!data) return;
                    markeurs.forEach(m => m.remove());
                    markeurs = [];
                    var points = Object.values(data);
                    points.forEach(function(d) {
                        var lat = parseFloat(d.lat);
                        var lon = parseFloat(d.lon);
                        var vibration = parseFloat(d.vibration) || 0;
                        var mag = parseFloat(d.mag) || 1;
                        if (isNaN(lat) || isNaN(lon)) return;
                        var marker = L.circle([lat, lon], {
                            radius: 30,
                            color: getCouleur(vibration),
                            fillColor: getCouleur(vibration),
                            fillOpacity: 0.9,
                            weight: 2
                        }).addTo(map).bindPopup(
                            "Force: " + mag.toFixed(2) + "g<br>" +
                            "Vibration: " + vibration.toFixed(3)
                        );
                        markeurs.push(marker);
                    });
                    document.getElementById('info').innerHTML =
                        '📍 ' + points.length + ' points enregistrés';
                }).catch(e => {});
        }

        // GPS du navigateur
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(function(pos) {
                var lat = pos.coords.latitude;
                var lon = pos.coords.longitude;
                positionActuelle = {lat: lat, lon: lon};
                map.setView([lat, lon], 16);
            }, function(err) {
                document.getElementById('info').innerHTML = 'GPS: ' + err.message;
            }, {enableHighAccuracy: true});
        }

        // Envoyer un point toutes les 2 secondes
        setInterval(function() {
            lireAccelero();
            if (positionActuelle) {
                envoyerPoint(positionActuelle.lat, positionActuelle.lon);
                chargerPoints();
            }
        }, 2000);

        chargerPoints();
    </script>
</body>
</html>
